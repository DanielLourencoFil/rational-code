name: Check
on:
  push:
  pull_request:
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check-book:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-book.mjs
